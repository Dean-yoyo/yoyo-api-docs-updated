<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<title>Guide</title>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
  font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  max-width: 900px;
  margin: auto;
  padding: 40px;
  color:#1a1a1a;
  line-height:1.6;
}

/* Headings */

h1{
  font-size:36px;
  margin-top:40px;
  margin-bottom:10px;
}

h2{
  font-size:26px;
  margin-top:40px;
  border-bottom:1px solid #eee;
  padding-bottom:8px;
}

h3{
  font-size:20px;
  margin-top:30px;
}

/* Paragraph spacing */

p{
  margin:10px 0 16px 0;
}

/* Lists */

ul{
  padding-left:20px;
  margin-bottom:20px;
}

li{
  margin:6px 0;
}

/* Images */

img{
  max-width:100%;
  margin:20px 0;
  border-radius:6px;
}

/* Tables */

table{
  width:100%;
  border-collapse:collapse;
  margin:20px 0;
  font-size:14px;
}

th{
  text-align:left;
  background:#f7f7f7;
  padding:10px;
  border-bottom:2px solid #ddd;
}

td{
  padding:10px;
  border-bottom:1px solid #eee;
}

/* Code blocks */

pre{
  background:#0f172a;
  color:#e2e8f0;
  padding:16px;
  border-radius:6px;
  overflow:auto;
  font-size:13px;
  line-height:1.4;
}

code{
  font-family: "SFMono-Regular", Consolas, monospace;
}

/* Inline code */

p code, li code{
  background:#f1f5f9;
  padding:2px 6px;
  border-radius:4px;
}

/* Links */

a{
  color:#2563eb;
  text-decoration:none;
}

a:hover{
  text-decoration:underline;
}

/* Horizontal rules */

hr{
  border:none;
  border-top:1px solid #eee;
  margin:40px 0;
}


</style>

</head>

<body>

<div id="content"></div>

<script>

const params = new URLSearchParams(window.location.search);
const file = params.get("file");

fetch(file)
.then(response => response.text())
.then(text => {
  document.getElementById("content").innerHTML = marked.parse(text);
});

</script>

</body>
</html>
