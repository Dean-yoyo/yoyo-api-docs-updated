          description: Card not registered; partner should proceed to registration
            flow
webhooks:
  transactionCallback:
    post:
      tags:
      - Webhooks
      summary: Transaction callback for sit-down payments
      description: Callback sent by Yoyo Platform to a merchant webhook URL when payment
        for an open bill has completed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionCallbackEvent'
      responses:
        '200':
          description: Webhook accepted
  vspAdviseCallback:
    post:
      tags:
      - Webhooks
      summary: VSP advise callback endpoint
      description: Endpoint implemented by the VSP to receive FINALISE/REVERSE advice
        from Yoyo.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdviceRequest'
      responses:
        '200':
          description: Advice processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdviceResponse'
  vspTokenInfoCallback:
    post:
      tags:
      - Webhooks
      summary: VSP token info callback endpoint
      description: Optional endpoint implemented by the VSP to validate a token and
        return token/balance information.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenInfoRequest'
      responses:
        '200':
          description: Token info returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenInfoResponse'
