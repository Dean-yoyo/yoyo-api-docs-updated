openapi: 3.0.3
info:
  title: Yoyo Group API
  version: 1.2.0
  description: 'Welcome to the **Yoyo Group API documentation**.


    This is a consolidated API reference for the main Yoyo services, grouped so Redoc
    renders them as clear sections in the left navigation, detailed documentation
    in the center, and request/response examples on the right.


    ## API sections


    - **POS API** — Point-of-sale transactions, advice flows, token info, transaction
    history, and bills

    - **CVS Issuer API** — campaigns, retailers, merchants, coupons, giftcards, users,
    and transactions

    - **VSP API** — provider-side token issuance and transaction processing

    - **Earn Gateway API** — transactional earn event ingestion

    - **Webhooks** — callback endpoints used by integrations


    ## How to read this reference


    1. Use the **left panel** to navigate by API section.

    2. Read endpoint descriptions and parameters in the **center panel**.

    3. Review request and response examples in the **right panel**.

    4. Expand schemas to inspect payload structure.


    ## Authentication overview


    Different sections use different headers:


    - **POS API**: `id`, `password`, `apiClientVersion`, `apiServerVersion`

    - **CVS Issuer API**: `apiId`, `apiPassword`

    - **VSP API**: `apiId`, `apiPassword` or `sha1Password`

    - **Earn Gateway API**: `apiKey`, `X-consumer-id`


    ## Logo setup


    The `x-logo.url` field must point to a publicly reachable URL. After you upload
    `logo.png` to your GitHub repo, update it to something like:


    `https://raw.githubusercontent.com/<your-org>/<your-repo>/main/logo.png`'
  x-logo:
    url: https://raw.githubusercontent.com/your-org/your-repo/main/logo.png
    altText: Yoyo
    backgroundColor: '#ffffff'
servers:
- url: https://rad2.wigroup.co:8181
  description: POS / VSP Transaction Engine
- url: https://token-manager-api-int.wigroup.co
  description: Token Manager
- url: https://za-vsp-int.wigroup.co/cvs-issuer/rest
  description: CVS Issuer
- url: https://developer.yoyogroup.com
  description: Earn Gateway placeholder host
tags:
- name: POS API
  description: Point-of-sale transaction processing, token lookups, advice flows,
    transaction history, and bills.
- name: CVS Issuer API
  description: Campaign, retailer, merchant, coupon, giftcard, user, and issuer transaction
    services.
- name: VSP API
  description: Value Service Provider token issuance and transaction processing.
- name: Earn Gateway API
  description: Transactional earn event ingestion.
- name: Webhooks
  description: Callback endpoints invoked by the platform or implemented by partners.
components:
  securitySchemes:
    posHeaderAuthId:
      type: apiKey
      in: header
      name: id
    posHeaderAuthPassword:
      type: apiKey
      in: header
      name: password
    apiIdHeader:
      type: apiKey
      in: header
      name: apiId
    apiPasswordHeader:
      type: apiKey
      in: header
      name: apiPassword
    sha1PasswordHeader:
      type: apiKey
      in: header
      name: sha1Password
    apiKeyHeader:
      type: apiKey
      in: header
      name: apiKey
    consumerIdHeader:
      type: apiKey
      in: header
      name: X-consumer-id
  parameters:
    campaignIdPath:
      name: campaignId
      in: path
      required: true
      schema:
        type: integer
    idPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    userRefPath:
      name: userRef
      in: path
      required: true
      schema:
        type: string
    storeIdQuery:
      name: storeId
      in: query
      schema:
        type: string
    posIdQuery:
      name: posId
      in: query
      schema:
        type: string
    basketIdQuery:
      name: basketId
      in: query
      schema:
        type: string
  schemas:
    ApiResponse:
      type: object
      properties:
        responseCode:
          type: string
          example: '-1'
        responseDesc:
          type: string
          example: Success
        httpStatusCode:
          type: integer
          example: 200
    Paging:
      type: object
      properties:
        pageSize:
          type: integer
        pageOffset:
          type: integer
        numItemsOnPage:
          type: integer
        numItemsInTotal:
          type: integer
        numPages:
          type: integer
    Token:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum:
          - WICODE
          - WIQR
          - BIN
          - wicode
        payload:
          type: string
        wiCode:
          type: string
        wiQR:
          type: string
    Product:
      type: object
      properties:
        id:
          type: string
        sku:
          type: string
        desc:
          type: string
        units:
          type: integer
        qty:
          type: integer
        pricePerUnit:
          type: integer
        price:
          type: integer
    BasketLine:
      type: object
      properties:
        product:
          $ref: '#/components/schemas/Product'
    StoreTrxDetails:
      type: object
      properties:
        storeId:
          oneOf:
          - type: integer
          - type: string
        remoteStoreId:
          type: string
        retailerId:
          oneOf:
          - type: integer
          - type: string
        basketId:
          type: string
        trxId:
          type: string
        posId:
          type: string
        cashierId:
          type: string
        billId:
          oneOf:
          - type: integer
          - type: string
        posBillId:
          type: string
    VspInfo:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        trxId:
          type: string
        responseCode:
          type: string
        responseDesc:
          type: string
    TransactionRequest:
      type: object
      required:
      - type
      - totalAmount
      - basketAmount
      - token
      - storeTrxDetails
      properties:
        type:
          type: string
          enum:
          - PAYMENT
          - DEPOSIT
          - WITHDRAWAL
          - REFUND
        switchTrxId:
          type: string
        totalAmount:
          type: integer
        basketAmount:
          type: integer
        cashbackAmount:
          type: integer
        tipAmount:
          type: integer
        billAmount:
          type: integer
        products:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        product:
          type: array
          items:
            $ref: '#/components/schemas/Product'
        token:
          $ref: '#/components/schemas/Token'
        storeTrxDetails:
          $ref: '#/components/schemas/StoreTrxDetails'
    TransactionResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          wiTrxId:
            type: integer
          totalAmountProcessed:
            type: integer
          basketAmountProcessed:
            type: integer
          cashbackAmountProcessed:
            type: integer
          tipAmountProcessed:
            type: integer
          billAmountProcessed:
            type: integer
          amountToSettle:
            type: integer
          vsp:
            $ref: '#/components/schemas/VspInfo'
          discount:
            type: array
            items:
              type: object
          loyalty:
            type: array
            items:
              type: object
          token:
            $ref: '#/components/schemas/Token'
          type:
            type: string
          storeTrxDetails:
            $ref: '#/components/schemas/StoreTrxDetails'
    AdviceRequest:
      type: object
      required:
      - action
      - originalTrx
      properties:
        action:
          type: string
          enum:
          - FINALISE
          - REVERSE
        originalTrx:
          type: object
          properties:
            storeTrxDetails:
              $ref: '#/components/schemas/StoreTrxDetails'
            wiTrxId:
              type: integer
            type:
              type: string
              enum:
              - PAYMENT
              - DEPOSIT
              - WITHDRAWAL
            token:
              $ref: '#/components/schemas/Token'
            switchTrxId:
              type: string
            vspTrxId:
              type: string
            totalAmountProcessed:
              type: integer
            basketAmountProcessed:
              type: integer
            cashbackAmountProcessed:
              type: integer
            tipAmountProcessed:
              type: integer
    AdviceResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          originalTrx:
            type: object
          action:
            type: string
          wiTrxId:
            type: integer
    TokenInfoRequest:
      type: object
      properties:
        token:
          $ref: '#/components/schemas/Token'
        storeTrxDetails:
          $ref: '#/components/schemas/StoreTrxDetails'
        type:
          type: string
          enum:
          - PAYMENT
          - DEPOSIT
          - WITHDRAWAL
    TokenInfoResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          vsp:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              balances:
                type: object
              hasVoucher:
                type: boolean
              hasCoupon:
                type: boolean
              hasWallet:
                type: boolean
              hasGiftCard:
                type: boolean
    TransactionHistoryRequest:
      type: object
      properties:
        storeTrxDetails:
          $ref: '#/components/schemas/StoreTrxDetails'
    TransactionHistoryEntry:
      type: object
      properties:
        wiTrxId:
          type: integer
        state:
          type: string
        vspId:
          type: integer
        vspName:
          type: string
        token:
          $ref: '#/components/schemas/Token'
        billAmount:
          type: integer
        totalAmountProcessed:
          type: integer
        basketAmountProcessed:
          type: integer
        cashbackAmountProcessed:
          type: integer
        tipAmountProcessed:
          type: integer
        amountToSettle:
          type: integer
        createDate:
          type: string
        lastModifiedDate:
          type: string
        responseCode:
          type: string
        adviceResponseCode:
          type: string
    TransactionHistoryResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          transactions:
            type: array
            items:
              $ref: '#/components/schemas/TransactionHistoryEntry'
    BillRequest:
      type: object
      required:
      - amount
      - basketId
      - storeId
      - posId
      properties:
        amount:
          type: integer
        basketId:
          type: string
        cashierId:
          type: string
        storeId:
          type: string
        posId:
          type: string
        basket:
          type: array
          items:
            $ref: '#/components/schemas/BasketLine'
    Bill:
      type: object
      properties:
        id:
          type: integer
        amount:
          type: integer
        basketId:
          type: string
        createDate:
          type: string
          format: date-time
        footer:
          type: string
        header:
          type: string
        mobilePaymentUrl:
          type: string
        posId:
          type: string
        qrData:
          type: string
        qrImage:
          type: string
        state:
          type: string
        storeId:
          type: string
    CreateTokenRequest:
      type: object
      required:
      - vspReference
      - tokenLifeInMin
      properties:
        discountWicodes:
          type: string
        loyaltyWicodes:
          type: string
        maxTrxAmount:
          type: string
        tokenLifeInMin:
          type: string
        transactionType:
          type: string
          enum:
          - PAYMENT
          - DEPOSIT
          - WITHDRAWAL
        vspReference:
          type: string
        tipAmount:
          type: string
    CreateTokenResponse:
      allOf:
      - $ref: '#/components/schemas/ApiResponse'
      - type: object
        properties:
          token:
            $ref: '#/components/schemas/Token'
    Retailer:
      type: object
      properties:
        createDate:
          type: string
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        logoURL:
          type: string
    Merchant:
      type: object
      properties:
        createDate:
          type: string
        id:
          type: integer
        name:
          type: string
        provinceDesc:
          type: string
        provinceId:
          type: integer
        stateId:
          type: string
        retailerId:
          type: integer
        retailerName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        distance:
          type: number
    CampaignMetadataEntry:
      type: object
      properties:
        name:
          type: string
        value:
          type: string
    CouponIssueRequest:
      type: object
      required:
      - campaignId
      - userRef
      properties:
        campaignId:
          type: integer
        userRef:
          type: string
        mobileNumber:
          type: string
        smsMessage:
          type: string
        sendSMS:
          type: boolean
    GiftcardIssueRequest:
      type: object
      required:
      - campaignId
      - balance
      - userRef
      properties:
        campaignId:
          type: integer
        balance:
          type: integer
        userRef:
          type: string
        mobileNumber:
          type: string
        email:
          type: string
        message:
          type: string
        issueWicode:
          type: boolean
        sendSMS:
          type: boolean
        sendEmail:
          type: boolean
    CouponOrVoucher:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        campaignName:
          type: string
        campaignType:
          type: string
        userRef:
          type: string
        mobileNumber:
          type: string
        wiCode:
          type: string
        wiQR:
          type: string
        stateId:
          type: string
        termsAndConditions:
          type: string
    Giftcard:
      type: object
      properties:
        id:
          type: integer
        campaignId:
          type: integer
        campaignName:
          type: string
        userRef:
          type: string
        mobileNumber:
          type: string
        email:
          type: string
        balance:
          type: integer
        processedAmount:
          type: integer
        imageUrl:
          type: string
        description:
          type: string
        termsAndConditions:
          type: string
        stateId:
          type: string
          enum:
          - A
          - D
          - E
          - R
        wiCode:
          type: string
        wiQR:
          type: string
    TopLevelTransaction:
      type: object
      properties:
        id:
          type: integer
        wiCode:
          type: string
        userRef:
          type: string
        merchantId:
          type: integer
        merchantName:
          type: string
        retailerId:
          type: integer
        retailerName:
          type: string
        processedAmount:
          type: integer
        numberOfCoupons:
          type: integer
        numberOfGiftcards:
          type: integer
        totalCouponProcessedAmount:
          type: integer
        totalGiftcardProcessedAmount:
          type: integer
        transactionDate:
          type: string
        interfaceIssuerId:
          type: string
        issuerId:
          type: integer
        stateId:
          type: string
    CouponTransaction:
      type: object
      properties:
        id:
          type: integer
        transactionId:
          type: integer
        couponId:
          type: integer
        userRef:
          type: string
        merchantId:
          type: integer
        merchantName:
          type: string
        retailerId:
          type: integer
        retailerName:
          type: string
        processedAmount:
          type: integer
        transactionDate:
          type: string
        interfaceIssuerId:
          type: string
        issuerId:
          type: integer
        stateId:
          type: string
    GiftcardTransaction:
      type: object
      properties:
        id:
          type: integer
        transactionId:
          type: integer
        giftcardId:
          type: integer
        userRef:
          type: string
        merchantId:
          type: integer
        merchantName:
          type: string
        retailerId:
          type: integer
        retailerName:
          type: string
        processedAmount:
          type: integer
        transactionDate:
          type: string
        interfaceIssuerId:
          type: string
        issuerId:
          type: integer
        stateId:
          type: string
    UserTokenRequest:
      type: object
      properties:
        campaignType:
          type: string
          enum:
          - COUPON
          - VOUCHER
          - COUPONVOUCHER
    UserPan:
      type: object
      properties:
        pan:
          type: string
        userRef:
          type: string
        interfaceIssuerGroupId:
          type: string
        interfaceIssuerId:
          type: string
        createDate:
          type: string
          format: date-time
        lastModifiedDate:
          type: string
          format: date-time
        interfaceGroupId:
          type: string
    MobileNumberUpdateRequest:
      type: object
      required:
      - mobileNumber
      properties:
        mobileNumber:
          type: string
    EarnGatewayEvent:
      type: object
      required:
      - reference
      - amount
      - customer
      - store
      properties:
        reference:
          type: string
          format: uuid
        amount:
          type: integer
        intent:
          type: string
          enum:
          - REASSIGN_ALIAS
        customer:
          type: object
          required:
          - type
          - reference
          properties:
            type:
              type: string
              enum:
              - ALIAS
            reference:
              type: string
            msisdn:
              type: string
        store:
          type: object
          required:
          - type
          - reference
          properties:
            type:
              type: string
              enum:
              - WIGROUP
              - REMOTE
            reference:
              type: string
        basket:
          type: array
          items:
            type: object
          description: Optional basket data is supported by the docs but not fully
            specified.
    EarnGatewayResponse:
      type: object
      description: The docs describe 200 for registered/success and 404 for not registered;
        response body is not fully specified.
    TransactionCallbackEvent:
      type: object
      properties:
        transactionId:
          type: integer
        basketId:
          type: string
        storeId:
          type: integer
        totalAmountProcessed:
          type: integer
        state:
          type: string
          enum:
          - S
          - R
          - F
security: []
paths:
  /wigroup-transactionengine/pos-providers/transaction:
    post:
      tags:
      - POS API
      summary: Create POS transaction
      security: &id001
      - posHeaderAuthId: []
        posHeaderAuthPassword: []
      parameters:
      - name: apiClientVersion
        in: header
        required: true
        schema:
          type: string
      - name: apiServerVersion
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
            examples:
              example:
                value:
                  type: PAYMENT
                  totalAmount: 5000
                  basketAmount: 5000
                  token:
                    type: WICODE
                    payload: '1234567890123456'
                  products:
                  - sku: ITEM-001
                    desc: Coffee
                    qty: 1
                    price: 5000
      responses:
        '200':
          description: Transaction processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
              examples:
                success:
                  value:
                    responseCode: '-1'
                    responseDesc: Success
                    httpStatusCode: 200
                    wiTrxId: 987654
                    totalAmountProcessed: 5000
                    amountToSettle: 5000
  /wigroup-transactionengine/pos-providers/advise:
    post:
      tags:
      - POS API
      summary: Advise transaction finalisation or reversal
      security: *id001
      parameters:
      - name: apiClientVersion
        in: header
        required: true
        schema:
          type: string
      - name: apiServerVersion
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdviceRequest'
      responses:
        '200':
          description: Advice accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdviceResponse'
  /wigroup-transactionengine/pos-providers/token-info:
    post:
      tags:
      - POS API
      summary: Get token info for a POS-presented token
      security: *id001
      parameters:
      - name: apiClientVersion
        in: header
        required: true
        schema:
          type: string
      - name: apiServerVersion
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenInfoRequest'
      responses:
        '200':
          description: Token info returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenInfoResponse'
  /wigroup-transactionengine/pos-providers/transaction-history:
    post:
      tags:
      - POS API
      summary: Get transaction history
      security: *id001
      parameters:
      - name: apiClientVersion
        in: header
        required: true
        schema:
          type: string
      - name: apiServerVersion
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionHistoryRequest'
      responses:
        '200':
          description: Transaction history returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionHistoryResponse'
  /wigroup-transactionengine/pos-providers/transaction-history/v2:
    post:
      tags:
      - POS API
      summary: Get transaction history V2
      description: Returns details for a single processed transaction.
      security: *id001
      parameters:
      - name: apiClientVersion
        in: header
        required: true
        schema:
          type: string
      - name: apiServerVersion
        in: header
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionHistoryRequest'
      responses:
        '200':
          description: Transaction details returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionHistoryResponse'
  /wigroup-bill/bills:
    post:
      tags:
      - POS API
      summary: Create bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BillRequest'
      responses:
        '200':
          description: Bill created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
    get:
      tags:
      - POS API
      summary: Get bill
      parameters:
      - $ref: '#/components/parameters/storeIdQuery'
      - $ref: '#/components/parameters/posIdQuery'
      - $ref: '#/components/parameters/basketIdQuery'
      responses:
        '200':
          description: Bill returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Bill'
  /wigroup-tokenmanager/vsp/tokens:
    post:
      tags:
      - VSP API
      summary: Issue VSP token / wiCode
      security:
      - apiIdHeader: []
        sha1PasswordHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTokenRequest'
            examples:
              example:
                value:
                  vspReference: ORDER-123
                  tokenLifeInMin: '30'
      responses:
        '200':
          description: Token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTokenResponse'
              examples:
                success:
                  value:
                    responseCode: '-1'
                    responseDesc: Success
  /wigroup-transactionengine/vsp/transactions:
    post:
      tags:
      - VSP API
      summary: Create transaction from VSP
      security:
      - apiIdHeader: []
        apiPasswordHeader: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TransactionRequest'
      responses:
        '200':
          description: Transaction processed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TransactionResponse'
  /campaigns/{campaignId}/metadata:
    get:
      tags:
      - CVS Issuer API
      summary: Get campaign metadata
      security: &id002
      - apiIdHeader: []
        apiPasswordHeader: []
      parameters:
      - $ref: '#/components/parameters/campaignIdPath'
      responses:
        '200':
          description: Metadata returned
          content:
            application/json:
              schema:
                allOf:
                - $ref: '#/components/schemas/ApiResponse'
                - type: object
                  properties:
                    campaignsMetadata:
                      type: array
                      items:
                        $ref: '#/components/schemas/CampaignMetadataEntry'
                    paging:
                      $ref: '#/components/schemas/Paging'
  /couponcampaigns:
    get:
      tags:
      - CVS Issuer API
